<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Full Control</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2210%22 width=%2280%22 height=%2280%22 rx=%2220%22 fill=%22%23071022%22/><rect x=%2220%22 y=%2220%22 width=%2260%22 height=%2260%22 rx=%2210%22 fill=%22%231873b9%22/><line x1=%2240%22 y1=%2220%22 x2=%2240%22 y2=%2280%22 stroke=%22%23ffffff%22 stroke-width=%224%22/><line x1=%2260%22 y1=%2220%22 x2=%2260%22 y2=%2280%22 stroke=%22%23ffffff%22 stroke-width=%224%22/><line x1=%2220%22 y1=%2240%22 x2=%2280%22 y2=%2240%22 stroke=%22%23ffffff%22 stroke-width=%224%22/><line x1=%2220%22 y1=%2260%22 x2=%2280%22 y2=%2260%22 stroke=%22%23ffffff%22 stroke-width=%224%22/></svg>">

    <style>
      :root {
        /* New WaffleWorks Robotics Color Palette */
        --brand-navy: #071022;
        --brand-blue: #1873b9;
        --bg-color: #f0f4f8;
        --container-bg: #ffffff;
        --text-main: #071022;
        --text-muted: #4a5568;
        --border-color: #cbd5e1;
      }
      
      html, body { margin: 0; padding: 0; }
      
      body {
        min-height: 100vh; 
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: system-ui, sans-serif; font-size: 16px; line-height: 1.5;
        display: flex; flex-direction: column;
      }

      /* HEADER */
      header.main-header {
        background-color: var(--container-bg); 
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 0; margin-bottom: 2rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }
      .header-content {
        max-width: 46rem; 
        margin: 0 auto; padding: 0 1.5rem;
        display: flex; 
        justify-content: center;
        align-items: center;
      }
      .logo-image { height: 75px; width: auto; }

      .container {
        max-width: 46rem; 
        margin-left: auto; margin-right: auto;
        padding: 0 1.5rem 2rem 1.5rem; 
        flex: 1; width: 100%; box-sizing: border-box;
      }

      h1 {
        margin-top: 0; margin-bottom: 1rem; padding-bottom: 0.35rem;
        border-bottom: 3px solid var(--brand-blue); font-size: 1.6rem;
        color: var(--brand-navy);
      }

      /* Control Pad Styles */
      .control-pad {
        display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 2rem;
      }
      .row { display: flex; gap: 10px; align-items: center; }

      .control {
        background: var(--container-bg);
        border: 2px solid var(--brand-blue);
        border-radius: 12px;
        width: 60px; height: 60px;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.1s ease;
        box-shadow: 0 4px 0 var(--brand-navy);
      }

      .control:active, .control.active-press {
        transform: translateY(4px); 
        box-shadow: 0 0 0 var(--brand-navy); 
        background: var(--brand-blue);
      }
      
      .control svg { 
        width: 32px; height: 32px; 
        fill: var(--brand-blue); 
        transition: fill 0.1s ease;
      }
      
      .control:hover svg { fill: var(--brand-navy); }
      .control:active svg, .control.active-press svg { fill: #ffffff; }

      .hint-text { text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem; }

      /* Footer */
      .main-footer {
        background-color: var(--container-bg); border-top: 1px solid var(--border-color);
        padding: 1.5rem 0; margin-top: 3rem; font-size: 0.85rem; color: var(--text-muted);
      }
      .footer-content {
        max-width: 46rem; 
        margin: 0 auto; padding: 0 1.5rem;
        display: flex; justify-content: space-between; align-items: center;
      }
      .footer-left strong { color: var(--brand-navy); }
      .footer-right {
        display: flex; align-items: center; gap: 8px;
        background: var(--bg-color); padding: 6px 12px;
        border-radius: 99px; border: 1px solid var(--border-color);
      }
      .status-indicator {
        width: 8px; height: 8px; background-color: #10b981;
        border-radius: 50%; box-shadow: 0 0 6px rgba(16, 185, 129, 0.6);
      }
      .status-text { font-weight: 600; color: var(--brand-navy); }

      @media (max-width: 600px) {
        .header-content { flex-direction: row; justify-content: center; } 
        .footer-content { flex-direction: column; gap: 1rem; text-align: center; }
      }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  
  <body>
    <header class="main-header">
      <div class="header-content">
        <img src="logoblue.jpg" alt="WaffleWorks Robotics" class="logo-image">
      </div>
    </header>

    <div class="container">
      <h1>Full Control</h1>
      
      <div class="control-pad">
        <div class="row">
          <span class='control' id='forward'>
            <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h6v8h4v-8h6z" /></svg>
          </span>
        </div>
        <div class="row middle">
          <span class='control' id='left'>
            <svg viewBox="0 0 24 24"><path d="M4 12l8-8v6h8v4h-8v6z" /></svg>
          </span>
          <span class='control' id='right'>
            <svg viewBox="0 0 24 24"><path d="M20 12l-8 8v-6h-8v-4h8v-6z" /></svg>
          </span>
        </div>
        <div class="row">
          <span class='control' id='backward'>
             <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-6v-8h-4v8h-6z" /></svg>
          </span>
        </div>
      </div>

      <p class="hint-text">
        Use arrow keys or click buttons to move.
      </p>
    </div>

    <footer class="main-footer">
      <div class="footer-content">
        <div class="footer-left">
          <span>&copy; 2026 <strong>WaffleWorks Robotics</strong></span>
        </div>
        <div class="footer-right">
          <span>System Status:</span>
          <span class="status-indicator"></span>
          <span class="status-text">Online</span>
        </div>
      </div>
    </footer>

    <script type="text/javascript"> 
        function pressBtn(id) {
           var btn = $('#' + id);
           btn.addClass('active-press');
           btn.click();
           setTimeout(function() { btn.removeClass('active-press'); }, 150);
        }
        $(document).on('keyup',function(event){
            if (event.keyCode==37) { pressBtn('left'); }
            if (event.keyCode==40) { pressBtn('backward'); }
            if (event.keyCode==39) { pressBtn('right'); }
            if (event.keyCode==38) { pressBtn('forward'); }
        });
        $('.control').on('click',function(){
            console.log("Button clicked: " + $(this).attr("id"));
            var url = 'http://{{server}}/fullcontrol?button='+$(this).attr("id");
            $.getJSON(url, function(data) { });
        }) 
    </script>
  </body>
</html>
