<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>[Challenge 3] Email System</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect x=%2210%22 y=%2210%22 width=%2280%22 height=%2280%22 rx=%2220%22 fill=%22%23071022%22/><rect x=%2220%22 y=%2220%22 width=%2260%22 height=%2260%22 rx=%2210%22 fill=%22%231873b9%22/><line x1=%2240%22 y1=%2220%22 x2=%2240%22 y2=%2280%22 stroke=%22%23ffffff%22 stroke-width=%224%22/><line x1=%2260%22 y1=%2220%22 x2=%2260%22 y2=%2280%22 stroke=%22%23ffffff%22 stroke-width=%224%22/><line x1=%2220%22 y1=%2240%22 x2=%2280%22 y2=%2240%22 stroke=%22%23ffffff%22 stroke-width=%224%22/><line x1=%2220%22 y1=%2260%22 x2=%2280%22 y2=%2260%22 stroke=%22%23ffffff%22 stroke-width=%224%22/></svg>">

    <style>
      :root {
        /* New WaffleWorks Robotics Color Palette */
        --brand-navy: #071022;
        --brand-blue: #1873b9;
        --bg-color: #f0f4f8;
        --container-bg: #ffffff;
        --text-main: #071022;
        --text-muted: #4a5568;
        --border-color: #cbd5e1;
      }
      
      html, body { margin: 0; padding: 0; }
      
      body {
        min-height: 100vh; 
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: system-ui, sans-serif; font-size: 16px; line-height: 1.5;
        display: flex; flex-direction: column;
      }

      /* HEADER */
      header.main-header {
        background-color: var(--container-bg); 
        border-bottom: 1px solid var(--border-color);
        padding: 1rem 0; margin-bottom: 2rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      }
      .header-content {
        max-width: 46rem; 
        margin: 0 auto; padding: 0 1.5rem;
        display: flex; 
        justify-content: center;
        align-items: center;
      }
      .logo-image { height: 75px; width: auto; }

      .container {
        max-width: 46rem; 
        margin-left: auto; margin-right: auto;
        padding: 0 1.5rem 2rem 1.5rem;
        flex: 1; width: 100%; box-sizing: border-box;
      }

      h1 {
        margin-top: 0; margin-bottom: 1rem; padding-bottom: 0.35rem;
        border-bottom: 3px solid var(--brand-blue); font-size: 1.6rem;
        color: var(--brand-navy);
      }
      p { margin-top: 0; margin-bottom: 0.75rem; }

      /* Inbox specific styles */
      #receivedemails {
        display: block; padding: 0.75rem;
        min-height: 4rem; max-height: 14rem; overflow-y: auto;
        background-color: var(--container-bg);
        border-radius: 0.75rem; border: 1px solid var(--border-color);
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        margin-bottom: 2rem;
      }
      #receivedemails b { color: var(--brand-blue); display: block; margin-top: 0.5rem; }

      input[type="text"], textarea {
        width: 100%; box-sizing: border-box; margin-top: 0.25rem; margin-bottom: 0.7rem;
        padding: 0.5rem 0.6rem; border-radius: 0.4rem; border: 1px solid var(--border-color);
        background-color: var(--container-bg); color: var(--text-main); font: inherit;
        transition: outline 0.2s;
      }
      input:focus, textarea:focus { 
        outline: 2px solid var(--brand-blue); 
        border-color: transparent; 
      }
      
      a.button-like {
        display: inline-flex; align-items: center; justify-content: center;
        padding: 0.4rem 1.2rem; border-radius: 999px; border: 2px solid var(--brand-blue);
        background-color: transparent; color: var(--brand-blue); font-weight: 600;
        text-decoration: none; min-width: 4.5rem; cursor: pointer; transition: all 0.2s;
      }
      a.button-like:hover { background-color: var(--brand-blue); color: #fff; }

      /* Footer */
      .main-footer {
        background-color: var(--container-bg); border-top: 1px solid var(--border-color);
        padding: 1.5rem 0; margin-top: 3rem; font-size: 0.85rem; color: var(--text-muted);
      }
      .footer-content {
        max-width: 46rem; 
        margin: 0 auto; padding: 0 1.5rem;
        display: flex; justify-content: space-between; align-items: center;
      }
      .footer-left strong { color: var(--brand-navy); }
      .footer-right {
        display: flex; align-items: center; gap: 8px;
        background: var(--bg-color); padding: 6px 12px;
        border-radius: 99px; border: 1px solid var(--border-color);
      }
      .status-indicator {
        width: 8px; height: 8px; background-color: #10b981;
        border-radius: 50%; box-shadow: 0 0 6px rgba(16, 185, 129, 0.6);
      }
      .status-text { font-weight: 600; color: var(--brand-navy); }

      @media (max-width: 600px) {
        .header-content { flex-direction: row; justify-content: center; } 
        .footer-content { flex-direction: column; gap: 1rem; text-align: center; }
      }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body>
    <header class="main-header">
      <div class="header-content">
        <img src="logoblue.jpg" alt="WaffleWorks Robotics" class="logo-image">
      </div>
    </header>

    <div class="container">
      <h1>[Challenge 3] Email System</h1>
      <p><b>Inbox [<span id="num">0</span> emails]</b></p>
      <div id="receivedemails"></div>

      <p><b>Write Email to: Emma</b></p>
      <form id="email-form">
        Subject: <br>
        <input type="text" label="subject" id="subject" name="subject" aria-label="Email subject"><br />
        Message: <br>
        <textarea label="message" id="message" name="message" rows="10" aria-label="Email message body"></textarea>
        <br>
        <a href="#" id="send" class="button-like" role="button" aria-label="Send email to Emma">send</a>
        <span id="sentmsg" style="margin-left: 10px; color: var(--brand-blue); font-weight: bold;">Sent!</span>
      </form>
    </div>

    <footer class="main-footer">
      <div class="footer-content">
        <div class="footer-left">
          <span>&copy; 2026 <strong>WaffleWorks Robotics</strong></span>
        </div>
        <div class="footer-right">
          <span>System Status:</span>
          <span class="status-indicator"></span>
          <span class="status-text">Online</span>
        </div>
      </div>
    </footer>

    <script type="text/javascript">
        $('span#sentmsg').hide();
        var num_emails = 0;
        $('#send').on('click',function(e){
            e.preventDefault();
            var url = 'http://{{server}}/sendemail?subject='+encodeURIComponent($('input#subject').val())+"&message="+encodeURIComponent($('textarea#message').val());
            $.getJSON(url, function(data) {
                console.log("Sent Email");
                $('input#subject').val("");
                $('textarea#message').val("");
                $('span#sentmsg').show();
                $('span#sentmsg').fadeOut(3000);
            });
        });

        setInterval(function () {
            var url = "http://{{server}}/checkemail";
            $.ajax({
                url: url,
                success: function (data) {
                    for (var i=0;i<data.length;i++) {
                        var d=data[i];
                        $('div#receivedemails').append("<b>From: Emma &bull; Subject: "+d['sub']+ "</b>"+d['msg']+"<br/>");
                        num_emails = num_emails + 1;
                        $('span#num').text(num_emails);
                    }
                }
            });
        }, 2000);
    </script>
  </body>
</html>
